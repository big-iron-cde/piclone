name: Build

on:
  push:
    tags:
      - '*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4.1.7
      with:
        fetch-depth: 0

    - name: Clone repo to ~/tools/pico-sdk
      run: git clone -b master --recurse-submodules https://github.com/raspberrypi/pico-sdk.git /home/runner/tools/pico-sdk

    - name: Install ARM cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi

    - name: Build for Pico 1
      run: |
        cd pico-rom-test
        mkdir -p build && cd build
        cmake .. -DPICO_BOARD=pico
        make
    env:
      PICO_SDK_PATH: /home/runner/tools/pico-sdk
# need to add release

