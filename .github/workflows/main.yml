name: Build

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        board: [pico, pico_w, pico2, pico2_w]
    steps:
    - uses: actions/checkout@v4

    - name: Clone Pico SDK
      run: git clone -b master --recurse-submodules https://github.com/raspberrypi/pico-sdk.git /home/runner/tools/pico-sdk

    - name: Install ARM cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi

    - name: Create bin output folder
      run: mkdir -p bin

    - name: Build for ${{ matrix.board }}
      env:
        PICO_SDK_PATH: /home/runner/tools/pico-sdk
      run: |
        cd src
        mkdir -p build && cd build
        cmake .. -DPICO_BOARD=${{ matrix.board }}
        make
        cp piclone.uf2 ../../bin/piclone-${{ matrix.board }}-${{ github.ref_name }}.uf2

    - name: Upload UF2 artifact
      uses: actions/upload-artifact@v4
      with:
        name: piclone-${{ matrix.board }}-${{ github.ref_name }}
        path: bin/piclone-${{ matrix.board }}-${{ github.ref_name }}.uf2

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all UF2 artifacts
      uses: actions/download-artifact@v4
      with:
        path: bin
        merge-multiple: true

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.uf2
        make_latest: true
